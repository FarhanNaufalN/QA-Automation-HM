name: QA Automation Run

run-name: 'QA [${{ inputs.test_suite }}] corr:${{ inputs.correlation_id }}'

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Unique ID for QA Apps to track this run'
        required: true
        type: string
      test_suite:
        description: 'chromium | chromium-login | firefox | regression-sales | regression-inventory | regression-purchasing | regression-finance'
        required: true
        default: 'chromium'
        type: string
      test_spec:
        description: 'Specific spec file (optional, e.g. tests/modules/sales/create-quotation.spec.ts)'
        required: false
        default: ''
        type: string
      base_url:
        description: 'Target HM3 URL'
        required: true
        type: string
      database:
        description: 'HM3 database name'
        required: true
        type: string
      username:
        description: 'HM3 login username'
        required: true
        type: string
      password:
        description: 'HM3 login password'
        required: true
        type: string
      customer_search:
        required: false
        default: ''
        type: string
      customer_name:
        required: false
        default: ''
        type: string
      product_search:
        required: false
        default: ''
        type: string
      product_name:
        required: false
        default: ''
        type: string
      product_qty:
        required: false
        default: '1'
        type: string
      quotation_path:
        required: false
        default: ''
        type: string

jobs:
  run-qa:
    name: 'Run [${{ inputs.test_suite }}]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Write .env config
        run: |
          cat > .env <<ENVEOF
          BASE_URL=${{ inputs.base_url }}
          DATABASE=${{ inputs.database }}
          USERNAME=${{ inputs.username }}
          PASSWORD=${{ inputs.password }}
          HEADLESS=true
          CUSTOMER_SEARCH=${{ inputs.customer_search }}
          CUSTOMER_NAME=${{ inputs.customer_name }}
          PRODUCT_SEARCH=${{ inputs.product_search }}
          PRODUCT_NAME=${{ inputs.product_name }}
          PRODUCT_QTY=${{ inputs.product_qty }}
          QUOTATION_PATH=${{ inputs.quotation_path }}
          ENVEOF

      - name: Run Playwright tests
        id: run
        run: |
          SPEC="${{ inputs.test_spec }}"
          if [ -n "$SPEC" ]; then
            npx playwright test "$SPEC" \
              --project="${{ inputs.test_suite }}" \
              --reporter=list,json,html \
              2>&1 | tee test-output.txt
          else
            npx playwright test \
              --project="${{ inputs.test_suite }}" \
              --reporter=list,json,html \
              2>&1 | tee test-output.txt
          fi
        continue-on-error: true

      - name: Generate QA Apps summary
        if: always()
        run: |
          RESULTS="reports/test-results/results.json"
          CORR="${{ inputs.correlation_id }}"
          RUN_ID="${{ github.run_id }}"

          if [ -f "$RESULTS" ]; then
            PASSED=$(jq -r '.stats.expected // 0' "$RESULTS")
            FAILED=$(jq -r '.stats.unexpected // 0' "$RESULTS")
            TOTAL=$(jq -r '.stats.total // 0' "$RESULTS")
          else
            PASSED=0; FAILED=1; TOTAL=1
          fi

          STATUS=$([ "$FAILED" -eq 0 ] && echo "PASSED" || echo "FAILED")

          mkdir -p reports
          printf '{"correlation_id":"%s","status":"%s","stats":{"passed":%s,"failed":%s,"total":%s},"github":{"run_id":"%s","run_url":"%s"}}' \
            "$CORR" "$STATUS" "$PASSED" "$FAILED" "$TOTAL" "$RUN_ID" "$RUN_URL" \
            > reports/qa-apps-summary.json

          echo "=== QA APPS SUMMARY ===" && cat reports/qa-apps-summary.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-result-${{ inputs.correlation_id }}
          path: |
            reports/
            test-output.txt
          retention-days: 7