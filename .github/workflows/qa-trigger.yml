name: QA Automation Trigger

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        required: true
        type: string
      test_suite:
        required: true
        type: string
      test_spec:
        required: false
        type: string
      base_url:
        required: true
        type: string
      database:
        required: true
        type: string
      username:
        required: true
        type: string
      password:
        required: true
        type: string
      customer_search:
        required: false
        type: string
      customer_name:
        required: false
        type: string
      product_search:
        required: false
        type: string
      product_name:
        required: false
        type: string
      product_qty:
        required: false
        default: '1'
        type: string
      quotation_path:
        required: false
        type: string

run-name: 'QA [${{ inputs.test_suite }}] corr:${{ inputs.correlation_id }}'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Run tests
        env:
          BASE_URL: ${{ inputs.base_url }}
          DATABASE: ${{ inputs.database }}
          USERNAME: ${{ inputs.username }}
          PASSWORD: ${{ inputs.password }}
          HEADLESS: 'true'
          CUSTOMER_SEARCH: ${{ inputs.customer_search }}
          CUSTOMER_NAME: ${{ inputs.customer_name }}
          PRODUCT_SEARCH: ${{ inputs.product_search }}
          PRODUCT_NAME: ${{ inputs.product_name }}
          PRODUCT_QTY: ${{ inputs.product_qty || '1' }}
          QUOTATION_PATH: ${{ inputs.quotation_path }}
        run: |
          SPEC="${{ inputs.test_spec }}"
          SUITE="${{ inputs.test_suite }}"
          if [ -n "$SPEC" ]; then
            npx playwright test "$SPEC" --project="$SUITE"
          else
            npx playwright test --project="$SUITE"
          fi

      - name: Generate summary
        if: always()
        env:
          CORRELATION_ID: ${{ inputs.correlation_id }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p reports
          node -e "
          const fs = require('fs');
          let passed = 0, failed = 0;
          try {
            const json = JSON.parse(fs.readFileSync('reports/test-results/results.json', 'utf8'));
            function count(suites) {
              for (const s of suites) {
                for (const spec of (s.specs || [])) {
                  const ok = spec.tests?.every(t => t.results?.every(r => r.status === 'passed'));
                  ok ? passed++ : failed++;
                }
                count(s.suites || []);
              }
            }
            count(json.suites || []);
          } catch(e) {}
          const out = { correlation_id: process.env.CORRELATION_ID, status: failed > 0 ? 'FAILED' : 'PASSED', stats: { passed, failed, total: passed + failed }, github: { run_id: process.env.RUN_ID, run_url: process.env.RUN_URL } };
          fs.writeFileSync('reports/qa-apps-summary.json', JSON.stringify(out, null, 2));
          "

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-result-${{ inputs.correlation_id }}
          path: reports/
          retention-days: 7